<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MicroExpert</title>
<style>
  :root {
    --bg: #1a1a2e;
    --bg-secondary: #16213e;
    --bg-chat: #0f3460;
    --text: #e0e0e0;
    --text-muted: #8892a4;
    --accent: #e94560;
    --accent-hover: #ff6b81;
    --user-bg: #1a1a4e;
    --assistant-bg: #16213e;
    --border: #2a2a4a;
    --input-bg: #0f0f2a;
    --scrollbar: #2a2a4a;
    --code-bg: #0d1117;
  }
  .light {
    --bg: #f5f5f5;
    --bg-secondary: #ffffff;
    --bg-chat: #e8e8e8;
    --text: #1a1a2e;
    --text-muted: #666;
    --accent: #e94560;
    --accent-hover: #d63851;
    --user-bg: #e3e8f0;
    --assistant-bg: #f0f0f0;
    --border: #ddd;
    --input-bg: #fff;
    --scrollbar: #ccc;
    --code-bg: #f0f0f0;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    overflow: hidden;
  }
  /* Sidebar */
  .sidebar {
    width: 260px;
    background: var(--bg-secondary);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
  }
  .sidebar-header {
    padding: 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .sidebar-header h1 {
    font-size: 18px;
    font-weight: 700;
    color: var(--accent);
  }
  .sidebar-actions {
    display: flex;
    gap: 8px;
  }
  .sidebar-actions button {
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 18px;
    padding: 4px;
    border-radius: 4px;
  }
  .sidebar-actions button:hover { color: var(--text); background: var(--border); }
  .new-chat-btn {
    margin: 12px 16px;
    padding: 10px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 500;
  }
  .new-chat-btn:hover { background: var(--accent-hover); }
  .history-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
  }
  .history-item {
    padding: 10px 12px;
    border-radius: 8px;
    cursor: pointer;
    margin-bottom: 4px;
    font-size: 13px;
    color: var(--text-muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .history-item:hover { background: var(--border); color: var(--text); }
  .history-item.active { background: var(--bg-chat); color: var(--text); }
  .history-date {
    font-size: 11px;
    color: var(--text-muted);
    padding: 8px 12px 4px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  /* Main chat area */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
  }
  .chat-container {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    scroll-behavior: smooth;
  }
  .message {
    max-width: 720px;
    margin: 0 auto 16px;
    padding: 14px 18px;
    border-radius: 12px;
    line-height: 1.6;
    font-size: 14px;
    word-wrap: break-word;
  }
  .message.user {
    background: var(--user-bg);
    border-left: 3px solid var(--accent);
  }
  .message.assistant {
    background: var(--assistant-bg);
  }
  .message .role {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-muted);
    margin-bottom: 6px;
  }
  .message.user .role { color: var(--accent); }
  .message code {
    background: var(--code-bg);
    padding: 2px 6px;
    border-radius: 4px;
    font-family: 'Cascadia Code', 'Fira Code', monospace;
    font-size: 13px;
  }
  .message pre {
    background: var(--code-bg);
    padding: 12px;
    border-radius: 8px;
    overflow-x: auto;
    margin: 8px 0;
  }
  .message pre code {
    background: none;
    padding: 0;
  }
  .message img {
    max-width: 300px;
    border-radius: 8px;
    margin-top: 8px;
  }
  .thinking {
    color: var(--text-muted);
    font-style: italic;
  }
  .thinking::after {
    content: '...';
    animation: dots 1.5s infinite;
  }
  @keyframes dots {
    0%, 20% { content: '.'; }
    40% { content: '..'; }
    60%, 100% { content: '...'; }
  }
  /* Input area */
  .input-area {
    padding: 16px 20px;
    border-top: 1px solid var(--border);
    background: var(--bg-secondary);
  }
  .input-wrapper {
    max-width: 720px;
    margin: 0 auto;
    display: flex;
    gap: 8px;
    align-items: flex-end;
  }
  .input-controls {
    display: flex;
    gap: 4px;
  }
  .input-controls button {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-muted);
    cursor: pointer;
    font-size: 18px;
    padding: 8px;
    border-radius: 8px;
    height: 42px;
    width: 42px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .input-controls button:hover { background: var(--border); color: var(--text); }
  .input-controls button.has-image { color: var(--accent); border-color: var(--accent); }
  #msg-input {
    flex: 1;
    background: var(--input-bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 14px;
    font-family: inherit;
    resize: none;
    min-height: 42px;
    max-height: 150px;
    line-height: 1.4;
  }
  #msg-input:focus { outline: none; border-color: var(--accent); }
  #msg-input::placeholder { color: var(--text-muted); }
  #send-btn {
    background: var(--accent);
    color: white;
    border: none;
    padding: 10px 16px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 16px;
    height: 42px;
    width: 42px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #send-btn:hover { background: var(--accent-hover); }
  #send-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .image-preview {
    max-width: 720px;
    margin: 0 auto 8px;
    display: none;
    align-items: center;
    gap: 8px;
  }
  .image-preview img {
    height: 48px;
    border-radius: 6px;
  }
  .image-preview .remove-img {
    background: none;
    border: none;
    color: var(--accent);
    cursor: pointer;
    font-size: 16px;
  }
  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--scrollbar); border-radius: 3px; }
  /* Responsive */
  @media (max-width: 768px) {
    .sidebar { display: none; }
    .message { padding: 10px 14px; }
    .input-area { padding: 12px; }
  }
  #file-input { display: none; }
</style>
</head>
<body>
  <aside class="sidebar">
    <div class="sidebar-header">
      <h1>MicroExpert</h1>
      <div class="sidebar-actions">
        <button id="theme-toggle" title="Toggle theme">🌙</button>
      </div>
    </div>
    <button class="new-chat-btn" id="new-chat">+ New Chat</button>
    <div class="history-list" id="history-list"></div>
  </aside>

  <main class="main">
    <div class="chat-container" id="chat-container">
      <div class="message assistant">
        <div class="role">MicroExpert</div>
        <div>Hello! I'm your local AI assistant with persistent memory. How can I help?</div>
      </div>
    </div>
    <div class="input-area">
      <div class="image-preview" id="image-preview">
        <img id="preview-img" src="" alt="preview">
        <button class="remove-img" id="remove-img">✕</button>
      </div>
      <div class="input-wrapper">
        <div class="input-controls">
          <button id="attach-btn" title="Attach image">📎</button>
        </div>
        <textarea id="msg-input" placeholder="Type a message..." rows="1"></textarea>
        <button id="send-btn" title="Send">➤</button>
      </div>
    </div>
  </main>
  <input type="file" id="file-input" accept="image/*">

<script>
const $ = s => document.querySelector(s);
const chatContainer = $('#chat-container');
const msgInput = $('#msg-input');
const sendBtn = $('#send-btn');
const fileInput = $('#file-input');
const imagePreview = $('#image-preview');
const previewImg = $('#preview-img');

let messages = [];
let imageData = null;
let generating = false;

// Theme toggle
$('#theme-toggle').addEventListener('click', () => {
  document.body.classList.toggle('light');
  $('#theme-toggle').textContent = document.body.classList.contains('light') ? '☀️' : '🌙';
});

// Auto-resize textarea
msgInput.addEventListener('input', () => {
  msgInput.style.height = 'auto';
  msgInput.style.height = Math.min(msgInput.scrollHeight, 150) + 'px';
});

// Send on Enter (Shift+Enter for newline)
msgInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

sendBtn.addEventListener('click', sendMessage);

// Image attachment
$('#attach-btn').addEventListener('click', () => fileInput.click());

fileInput.addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    imageData = ev.target.result;
    previewImg.src = imageData;
    imagePreview.style.display = 'flex';
    $('#attach-btn').classList.add('has-image');
  };
  reader.readAsDataURL(file);
  fileInput.value = '';
});

$('#remove-img').addEventListener('click', () => {
  imageData = null;
  imagePreview.style.display = 'none';
  $('#attach-btn').classList.remove('has-image');
});

// New chat
$('#new-chat').addEventListener('click', () => {
  messages = [];
  imageData = null;
  imagePreview.style.display = 'none';
  $('#attach-btn').classList.remove('has-image');
  chatContainer.innerHTML = `
    <div class="message assistant">
      <div class="role">MicroExpert</div>
      <div>Hello! I'm your local AI assistant with persistent memory. How can I help?</div>
    </div>`;
});

async function sendMessage() {
  const text = msgInput.value.trim();
  if (!text || generating) return;

  generating = true;
  sendBtn.disabled = true;

  // Add user message to UI
  const userDiv = addMessage('user', text);
  if (imageData) {
    const img = document.createElement('img');
    img.src = imageData;
    userDiv.querySelector('.content') ? userDiv.querySelector('.content').appendChild(img) : userDiv.appendChild(img);
  }

  messages.push({ role: 'user', content: text });
  msgInput.value = '';
  msgInput.style.height = 'auto';

  // Add thinking indicator
  const assistantDiv = addMessage('assistant', '');
  const contentDiv = assistantDiv.lastElementChild;
  contentDiv.classList.add('thinking');
  contentDiv.textContent = 'Thinking';

  // Build request
  const body = {
    messages: [...messages],
    stream: true,
    user: 'local',
  };
  if (imageData) body.image = imageData;

  // Clear image after sending
  imageData = null;
  imagePreview.style.display = 'none';
  $('#attach-btn').classList.remove('has-image');

  try {
    const res = await fetch('/v1/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });

    if (!res.ok) {
      const err = await res.json().catch(() => ({ error: { message: 'Unknown error' } }));
      contentDiv.classList.remove('thinking');
      contentDiv.innerHTML = `<em style="color:var(--accent)">Error: ${err.error?.message || res.statusText}</em>`;
      generating = false;
      sendBtn.disabled = false;
      return;
    }

    // Stream response
    contentDiv.classList.remove('thinking');
    contentDiv.textContent = '';
    let fullContent = '';

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buf = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      buf += decoder.decode(value, { stream: true });
      const lines = buf.split('\n');
      buf = lines.pop();

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const data = line.slice(6).trim();
        if (data === '[DONE]') continue;
        try {
          const chunk = JSON.parse(data);
          const delta = chunk.choices?.[0]?.delta?.content || '';
          if (delta) {
            fullContent += delta;
            contentDiv.innerHTML = renderMarkdown(fullContent);
            chatContainer.scrollTop = chatContainer.scrollHeight;
          }
        } catch {}
      }
    }

    messages.push({ role: 'assistant', content: fullContent });
  } catch (e) {
    contentDiv.classList.remove('thinking');
    contentDiv.innerHTML = `<em style="color:var(--accent)">Connection error: ${e.message}</em>`;
  }

  generating = false;
  sendBtn.disabled = false;
  loadHistory();
}

function addMessage(role, text) {
  const div = document.createElement('div');
  div.className = `message ${role}`;
  div.innerHTML = `<div class="role">${role === 'user' ? 'You' : 'MicroExpert'}</div><div>${renderMarkdown(text)}</div>`;
  chatContainer.appendChild(div);
  chatContainer.scrollTop = chatContainer.scrollHeight;
  return div;
}

function renderMarkdown(text) {
  if (!text) return '';
  return text
    // Code blocks
    .replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>')
    // Inline code
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    // Bold
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    // Italic
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    // Line breaks
    .replace(/\n/g, '<br>');
}

// Load conversation history
async function loadHistory() {
  try {
    const res = await fetch('/history');
    if (!res.ok) return;
    const data = await res.json();
    const list = $('#history-list');
    list.innerHTML = '';

    let lastDate = '';
    for (const s of (data.sessions || [])) {
      const date = new Date(s.createdAt).toLocaleDateString();
      if (date !== lastDate) {
        lastDate = date;
        const dateDiv = document.createElement('div');
        dateDiv.className = 'history-date';
        dateDiv.textContent = date;
        list.appendChild(dateDiv);
      }
      const item = document.createElement('div');
      item.className = 'history-item';
      item.textContent = s.preview || 'Empty session';
      item.addEventListener('click', () => loadSession(s.id));
      list.appendChild(item);
    }
  } catch {}
}

async function loadSession(id) {
  try {
    const res = await fetch(`/history/${id}`);
    if (!res.ok) return;
    const session = await res.json();

    messages = [];
    chatContainer.innerHTML = '';

    if (session.messages) {
      for (const m of session.messages) {
        addMessage(m.role, m.content);
        if (m.role === 'user' || m.role === 'assistant') {
          messages.push({ role: m.role, content: m.content });
        }
      }
    } else if (session.content) {
      addMessage('assistant', session.content);
    }
  } catch {}
}

// Initial history load
loadHistory();
msgInput.focus();
</script>
</body>
</html>
